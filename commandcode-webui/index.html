<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cmd -p Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #d29922;
    --err: #f85149;
    --radius: 8px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

  body { display: flex; max-width: 1100px; margin: 0 auto; height: 100vh; }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 12px 0;
  }
  #sidebar h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-dim); padding: 0 12px 8px;
  }
  #conv-list {
    flex: 1; overflow-y: auto;
    font-size: 13px;
  }
  #conv-list::-webkit-scrollbar { width: 4px; }
  #conv-list::-webkit-scrollbar-track { background: transparent; }
  #conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .conv-item {
    padding: 8px 12px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s;
    color: var(--text-dim);
    position: relative;
  }
  .conv-item:hover { background: var(--surface); }
  .conv-item.active { color: var(--text); border-color: var(--accent); background: var(--surface); }
  .conv-item .preview {
    font-size: 12px; color: var(--text-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .conv-item .conv-id {
    font-size: 9px; color: var(--text-dim); opacity: 0.4;
    font-family: var(--mono); margin-top: 1px;
  }
  .conv-item .ts { font-size: 10px; color: var(--text-dim); opacity: 0.6; }

  .conv-del {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 13px; padding: 4px; opacity: 0;
    transition: opacity 0.15s;
  }
  .conv-item:hover .conv-del { opacity: 0.6; }
  .conv-del:hover { opacity: 1 !important; color: var(--err); }

  #new-chat-btn {
    margin: 8px 12px; padding: 6px 12px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--accent); border-radius: var(--radius);
    cursor: pointer; font-size: 13px; text-align: center;
  }
  #new-chat-btn:hover { background: var(--surface2); }

  /* ── Main panel ── */
  #main {
    flex: 1; display: flex; flex-direction: column;
    padding: 0 16px; min-width: 0;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 10px; flex-wrap: wrap;
  }
  h1 {
    font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  h1 small { font-size: 11px; color: var(--text-dim); font-weight: 400; }

  .model-row {
    display: flex; align-items: center; gap: 6px;
  }
  .model-row label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  #model {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 3px 8px; font-size: 12px; font-family: var(--mono);
    width: 200px; outline: none;
  }
  #model:focus { border-color: var(--accent); }
  #model-list { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

  /* ── Chat area ── */
  #chat {
    flex: 1; overflow-y: auto; padding: 12px 0;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex; flex-direction: column; gap: 3px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg-header {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim);
  }
  .msg-header .label {
    font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 1px 5px; border-radius: 3px;
  }
  .msg.user .label { color: var(--accent); }
  .msg.assistant .label { color: var(--accent2); }
  .msg.user .label::before { content: 'You'; }
  .msg.assistant .label::before { content: 'cmd'; }

  .msg-body {
    font-size: 14px; line-height: 1.65;
    padding: 10px 14px; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--border);
    overflow-x: auto;
  }
  .msg.user .msg-body { border-color: var(--accent); border-left: 3px solid var(--accent); }
  .msg.assistant .msg-body { border-left: 3px solid var(--accent2); }

  .msg-body pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px; overflow-x: auto;
    font-family: var(--mono); font-size: 13px; margin: 8px 0;
  }
  .msg-body code {
    font-family: var(--mono); font-size: 13px;
    background: var(--bg); padding: 2px 5px; border-radius: 4px;
  }
  .msg-body pre code { background: none; padding: 0; }
  .msg-body p { margin: 5px 0; }
  .msg-body p:first-child { margin-top: 0; }
  .msg-body p:last-child { margin-bottom: 0; }
  .msg-body ul, .msg-body ol { padding-left: 20px; margin: 5px 0; }
  .msg-body blockquote { border-left: 3px solid var(--border); padding-left: 12px; margin: 6px 0; color: var(--text-dim); }

  .cursor-blink::after {
    content: '\258C';
    animation: blink 0.8s step-end infinite;
    color: var(--accent2);
  }
  @keyframes blink { 50% { opacity: 0; } }

  .msg.error .msg-body { border-color: var(--err); background: #2d1517; color: var(--err); }

  /* ── Empty state ── */
  #empty {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 10px;
    color: var(--text-dim); text-align: center;
  }
  #empty .icon { font-size: 40px; opacity: 0.3; }
  #empty p { font-size: 14px; max-width: 360px; line-height: 1.5; }
  #empty code { font-family: var(--mono); font-size: 12px; background: var(--surface); padding: 2px 6px; border-radius: 3px; }

  /* ── Input ── */
  #input-area {
    display: flex; gap: 8px; padding: 10px 0 16px;
    flex-shrink: 0;
  }
  #input {
    flex: 1; resize: none; height: 42px; max-height: 120px;
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    font-family: var(--font); font-size: 14px; outline: none;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--text-dim); }

  #send {
    width: 42px; height: 42px; flex-shrink: 0;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #send:hover { background: #4090e0; }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }

  @media (max-width: 720px) {
    #sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h2>History</h2>
  <div id="conv-list"></div>
  <button id="new-chat-btn">+ New Chat</button>
</div>

<!-- Main -->
<div id="main">
<header>
  <h1>&#x25B8; cmd -p <small>chat with context</small></h1>
  <div class="model-row">
    <label for="model">Model</label>
    <input type="text" id="model" list="model-list" value="deepseek/deepseek-v4-flash" autocomplete="off" spellcheck="false">
    <datalist id="model-list"></datalist>
  </div>
</header>

<div id="chat">
  <div id="empty">
    <div class="icon">&#x1F4AC;</div>
    <p>Ask anything. Each conversation saves context<br>via <code>--continue</code> / <code>--resume</code>.</p>
  </div>
</div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="Ask something..." autofocus></textarea>
  <button id="send" title="Send">&#x27A4;</button>
</div>
</div>

<script>
/* ── Config ── */
marked.setOptions({ breaks: true, gfm: true });

/* ── DOM ── */
const chat       = document.getElementById('chat');
const empty      = document.getElementById('empty');
const input      = document.getElementById('input');
const sendBtn    = document.getElementById('send');
const modelInp   = document.getElementById('model');
const modelDl    = document.getElementById('model-list');
const convList   = document.getElementById('conv-list');
const newChatBtn = document.getElementById('new-chat-btn');

let streaming = false;
let abortController = null;
let currentMsgBody = null;

/* ── Conversation state ── */
let currentConvId = localStorage.getItem('cmd_current_conv') || '';

/* ── Load models ── */
fetch('/api/models')
  .then(r => r.json())
  .then(data => {
    modelDl.innerHTML = data.models.map(m => `<option value="${m}">`).join('');
  })
  .catch(() => {});

/* ── Helpers ── */
function stripAnsi(t) {
  return t.replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'').replace(/\x1b\].*?\x07/g,'').replace(/\x1b[PX^_].*?\x1b\\/g,'');
}
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

async function initConv() {
  if (!currentConvId) {
    await newConv();
  }
  loadConvList();
  loadHistory();
}

async function newConv() {
  const r = await fetch('/api/new', { method: 'POST' });
  const d = await r.json();
  currentConvId = d.conv_id;
  localStorage.setItem('cmd_current_conv', currentConvId);
  chat.innerHTML = '';
  empty.style.display = 'flex';
  currentMsgBody = null;
  loadConvList();
}

async function switchConv(id) {
  currentConvId = id;
  localStorage.setItem('cmd_current_conv', currentConvId);
  chat.innerHTML = '';
  currentMsgBody = null;
  await loadHistory();
  loadConvList();
}

async function loadConvList() {
  try {
    const r = await fetch('/api/conversations');
    const d = await r.json();
    convList.innerHTML = d.conversations.map(c =>
      `<div class="conv-item${c.id === currentConvId ? ' active' : ''}" data-id="${esc(c.id)}">
        <div class="preview">${esc(c.title)}</div>
        <div class="conv-id">${esc(c.id)}</div>
        <button class="conv-del" title="Delete">&#x2716;</button>
      </div>`
    ).join('') || '<div style="padding:12px;color:var(--text-dim);font-size:12px;">No conversations yet</div>';
    // Click to switch
    convList.querySelectorAll('.conv-item').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.conv-del')) return;
        switchConv(el.dataset.id);
      });
    });
    // Delete
    convList.querySelectorAll('.conv-del').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.closest('.conv-item').dataset.id;
        if (id === currentConvId) {
          // If deleting current, start a new one
          await newConv();
        }
        await fetch(`/api/conversation/${id}`, { method: 'DELETE' });
        loadConvList();
      });
    });
  } catch(e) { /* ignore */ }
}

async function loadHistory() {
  if (!currentConvId) return;
  try {
    const r = await fetch(`/api/history/${currentConvId}`);
    const d = await r.json();
    chat.innerHTML = '';
    currentMsgBody = null;
    if (!d.messages || d.messages.length === 0) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';
    for (const msg of d.messages) {
      const role = msg.role === 'user' ? 'user' : 'assistant';
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-header"><span class="label"></span></div>
                       <div class="msg-body">${marked.parse(esc(msg.content))}</div>`;
      chat.appendChild(div);
    }
    scrollBottom();
  } catch(e) { /* ignore */ }
}

function addMessage(role, initialText) {
  empty.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-header"><span class="label"></span></div>
                   <div class="msg-body">${role === 'user' ? esc(initialText) : (marked.parse(initialText||'') + '<span class="cursor-blink"></span>')}</div>`;
  chat.appendChild(div);
  scrollBottom();
  if (role === 'assistant') {
    currentMsgBody = div.querySelector('.msg-body');
  }
  return div;
}

function appendText(text) {
  if (!currentMsgBody) return;
  const clean = stripAnsi(text);
  // Get current text content, append, re-render markdown
  const current = currentMsgBody.textContent || '';
  currentMsgBody.textContent = current + clean;
  currentMsgBody.innerHTML = marked.parse(currentMsgBody.textContent || '') + '<span class="cursor-blink"></span>';
  scrollBottom();
}

function finalizeMessage() {
  if (currentMsgBody) {
    // Remove cursor
    const html = currentMsgBody.innerHTML;
    currentMsgBody.innerHTML = html.replace('<span class="cursor-blink"></span>', '');
    currentMsgBody = null;
  }
}

function showError(msg) {
  empty.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg error';
  div.innerHTML = `<div class="msg-header"><span class="label" style="color:var(--err)">Error</span></div>
                   <div class="msg-body">${esc(msg)}</div>`;
  chat.appendChild(div);
  scrollBottom();
}

/* ── Auto-resize ── */
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

/* ── Send ── */
async function send() {
  const query = input.value.trim();
  if (!query || streaming) return;
  if (!currentConvId) await initConv();

  const model = modelInp.value.trim() || 'deepseek/deepseek-v4-flash';
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  streaming = true;

  addMessage('user', query);
  addMessage('assistant', '');

  abortController = new AbortController();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: query, m: model, conv_id: currentConvId }),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      showError(`HTTP ${resp.status}: ${resp.statusText}`);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (!payload) continue;
        try {
          const data = JSON.parse(payload);
          if (data.text) appendText(data.text);
          else if (data.error) { finalizeMessage(); showError(data.error); }
          else if (data.done) { finalizeMessage(); loadConvList(); }
        } catch(e) { /* ignore */ }
      }
    }

    if (buffer.startsWith('data: ')) {
      const payload = buffer.slice(6).trim();
      if (payload) {
        try {
          const data = JSON.parse(payload);
          if (data.done) finalizeMessage();
          else if (data.error) { finalizeMessage(); showError(data.error); }
        } catch(e) {}
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') finalizeMessage();
    else { finalizeMessage(); showError(err.message); }
  } finally {
    streaming = false;
    sendBtn.disabled = false;
    input.focus();
    abortController = null;
  }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
newChatBtn.addEventListener('click', newConv);

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    chat.innerHTML = '';
    empty.style.display = 'flex';
    currentMsgBody = null;
  }
});

/* ── Start ── */
initConv();
</script>
</body>
</html>
